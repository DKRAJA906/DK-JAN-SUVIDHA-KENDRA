<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DK Jan Suvidha Kendra - Instant Aadhaar A4 Print Portal</title>
  
  <!-- PDF.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <style>
    :root {
      --bg-color: #f3f4f6;
      --panel-bg: #ffffff;
      --primary-blue: #0f529a;
      --card-w: 85.6mm;
      --card-h: 53.98mm;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: Arial, sans-serif;
      background: var(--bg-color);
      padding: 20px;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .control-panel {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 25px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 30px;
    }

    .shop-header {
      background: linear-gradient(135deg, #0f529a 0%, #0a396c 100%);
      color: white;
      padding: 15px;
      text-align: center;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .shop-header h1 { font-size: 24px; letter-spacing: 1px; }
    .shop-header p { font-size: 13px; color: #e0e0e0; margin-top: 5px; }

    .upload-box {
      border: 2px dashed var(--primary-blue);
      background: #f8fafc;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 20px;
    }

    .upload-box label {
      display: block;
      font-weight: bold;
      color: var(--primary-blue);
      margin-bottom: 10px;
      font-size: 16px;
    }

    .input-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="file"], input[type="password"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    input[type="password"] { width: 200px; }

    .btn-print {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-print:hover { background: #1b5e20; }

    .preview-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #555;
      width: 100%;
      max-width: 210mm;
      text-align: left;
    }

    #a4-page-sheet {
      background: white;
      width: 210mm;
      height: 297mm;
      box-shadow: 0 4px 25px rgba(0,0,0,0.15);
      padding: 15mm 12mm;
      position: relative;
    }

    .cards-wrapper {
      display: flex;
      flex-direction: row;
      gap: 6mm;
      justify-content: flex-start;
    }

    .aadhaar-card-render {
      width: var(--card-w);
      height: var(--card-h);
      border: 0.2mm solid #ccc;
      border-radius: 2.5mm;
      overflow: hidden;
      background: #fff;
    }

    .pdf-canvas-render {
      width: 100%;
      height: 100%;
      display: block;
    }

    .status-msg {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
      color: #d32f2f;
    }

    @media print {
      body { background: white; padding: 0; margin: 0; }
      .control-panel, .preview-title { display: none !important; }
      #a4-page-sheet {
        box-shadow: none !important;
        padding: 15mm 12mm !important;
        margin: 0 !important;
        border: none !important;
        width: 210mm !important;
        height: 297mm !important;
        display: block !important;
      }
      .cards-wrapper {
        display: flex !important;
        flex-direction: row !important;
        gap: 6mm !important;
      }
      .aadhaar-card-render {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @page { size: A4 portrait; margin: 0; }
    }
  </style>
</head>
<body>

  <div class="control-panel">
    <div class="shop-header">
      <h1>DK JAN SUVIDHA KENDRA</h1>
      <p>Instant Digital Aadhaar Auto-Crop Print Portal (A4 Layout)</p>
    </div>

    <div class="upload-box">
      <label>🔒 ओरिजिनल आधार पीडीएफ चुनें और पासवर्ड डालें:</label>
      <div class="input-group">
        <input type="file" id="pdfFile" accept=".pdf" />
        <input type="password" id="pdfPassword" placeholder="PDF पासवर्ड दर्ज करें" />
        <button class="btn-print" id="printActionBtn">क्विक प्रिंट (Print)</button>
      </div>
      <div id="statusOutput" class="status-msg" style="color: #2e7d32; margin-top: 12px;">कृपया पीडीएफ और पासवर्ड दर्ज करें...</div>
    </div>
  </div>

  <div class="preview-title">A4 पेपर प्रिंट प्रीव्यू (अगल-बगल परफेक्ट फिटिंग):</div>

  <div id="a4-page-sheet">
    <div class="cards-wrapper">
      <!-- फ्रंट साइड कार्ड -->
      <div class="aadhaar-card-render">
        <canvas id="frontCanvas" class="pdf-canvas-render"></canvas>
      </div>
      <!-- बैक साइड कार्ड -->
      <div class="aadhaar-card-render">
        <canvas id="backCanvas" class="pdf-canvas-render"></canvas>
      </div>
    </div>
  </div>

  <!-- बैकग्राउंड प्रोसेसिंग के लिए छिपा हुआ कैनवास -->
  <canvas id="hiddenFullCanvas" style="display: none;"></canvas>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fileInput = document.getElementById('pdfFile');
    const passwordInput = document.getElementById('pdfPassword');
    const statusOutput = document.getElementById('statusOutput');
    const printActionBtn = document.getElementById('printActionBtn');

    let pdfDataBuffer = null;

    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        pdfDataBuffer = new Uint8Array(evt.target.result);
        statusOutput.style.color = '#333';
        statusOutput.textContent = "पीडीएफ लोड हो गई है। कृपया पासवर्ड डालें।";
        processAadhaarPdf();
      };
      reader.readAsArrayBuffer(file);
    });

    passwordInput.addEventListener('input', function() {
      if (pdfDataBuffer) processAadhaarPdf();
    });

    async function processAadhaarPdf() {
      if (!pdfDataBuffer) return;
      
      const password = passwordInput.value.trim();
      statusOutput.style.color = '#0f529a';
      statusOutput.textContent = "पीडीएफ को डिक्रिप्ट किया जा रहा है...";

      try {
        const loadingTask = pdfjsLib.getDocument({
          data: pdfDataBuffer,
          password: password
        });

        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1); 
        
        statusOutput.style.color = '#2e7d32';
        statusOutput.textContent = "🎉 सफलता! कार्ड्स को एकदम सटीक क्रॉप कर दिया गया है।";

        // बेहतर क्लेरिटी के लिए 4.0 हाई स्केल रेंडरिंग
        const renderScale = 4.0; 
        const viewport = page.getViewport({ scale: renderScale });

        // छिपे हुए कैनवास पर पूरा पेज रेंडर करना
        const hiddenCanvas = document.getElementById('hiddenFullCanvas');
        const hiddenCtx = hiddenCanvas.getContext('2d');
        hiddenCanvas.width = viewport.width;
        hiddenCanvas.height = viewport.height;

        const renderContext = { canvasContext: hiddenCtx, viewport: viewport };
        await page.render(renderContext).promise;

        // दिखने वाले कैनवास की सेटिंग्स
        const frontCanvas = document.getElementById('frontCanvas');
        const frontCtx = frontCanvas.getContext('2d');
        const backCanvas = document.getElementById('backCanvas');
        const backCtx = backCanvas.getContext('2d');

        // स्टैंडर्ड आईडी कार्ड रेशियो सेट करना
        frontCanvas.width = 1011;
        frontCanvas.height = 638;
        backCanvas.width = 1011;
        backCanvas.height = 638;

        // ई-आधार पीडीएफ में नीचे की पट्टी को परफेक्ट काटने की डाइमेंशन्स
        const fullW = hiddenCanvas.width;
        const fullH = hiddenCanvas.height;

        const cropW = fullW * 0.49;  // आधा हिस्सा फ्रंट, आधा बैक
        const cropH = fullH * 0.285; // नीचे का कार्ड एरिया हाइट
        const cropY = fullH - cropH; // बिल्कुल नीचे से शुरुआत

        const srcFrontX = 0;
        const srcBackX = fullW * 0.51; // बीच के गैप के बाद बैक साइड शुरू

        // सटीक क्रॉपिंग लॉजिक (बिना किसी खिंचाव के)
        frontCtx.drawImage(hiddenCanvas, srcFrontX, cropY, cropW, cropH, 0, 0, frontCanvas.width, frontCanvas.height);
        backCtx.drawImage(hiddenCanvas, srcBackX, cropY, cropW, cropH, 0, 0, backCanvas.width, backCanvas.height);

      } catch (error) {
        statusOutput.style.color = '#d32f2f';
        if (error.name === 'PasswordException') {
          statusOutput.textContent = "❌ गलत पासवर्ड! कृपया ध्यान दें कि पासवर्ड कैपिटल अक्षरों में होना चाहिए।";
        } else {
          statusOutput.textContent = "❌ एरर: फाइल को खोलने में समस्या आई। कृपया सही डिजिटल फाइल का उपयोग करें।";
          console.error(error);
        }
      }
    }

    printActionBtn.addEventListener('click', function() {
      if (!pdfDataBuffer) {
        alert("कृपया पहले आधार पीडीएफ फाइल सेलेक्ट करें!");
        return;
      }
      window.print();
    });
  </script>
</body>
</html>
