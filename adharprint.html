<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Aadhaar Print</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .controls { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; display: inline-block; }
        canvas { border: 2px solid #000; width: 323px; height: 203px; margin: 10px; }
        @media print { .controls { display: none; } }
    </style>
</head>
<body>

<div class="controls">
    <input type="file" id="f">
    <input type="password" id="p" placeholder="Password">
    <button onclick="run()">प्रिंट प्रीव्यू</button>
</div>
<br>
<canvas id="c1"></canvas>
<canvas id="c2"></canvas>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    async function run() {
        const file = document.getElementById('f').files[0];
        const pass = document.getElementById('p').value;
        const reader = new FileReader();

        reader.onload = async function() {
            const pdf = await pdfjsLib.getDocument({data: new Uint8Array(this.result), password: pass}).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 4 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({canvasContext: canvas.getContext('2d'), viewport: viewport}).promise;

            const c1 = document.getElementById('c1');
            const c2 = document.getElementById('c2');
            c1.width = 1011; c1.height = 638;
            c2.width = 1011; c2.height = 638;

            const ctx1 = c1.getContext('2d');
            const ctx2 = c2.getContext('2d');

            // आधार का कटिंग एरिया फिक्स किया गया है
            const w = canvas.width / 2;
            const h = canvas.height * 0.28;
            const y = canvas.height * 0.72;

            ctx1.drawImage(canvas, 0, y, w, h, 0, 0, 1011, 638);
            ctx2.drawImage(canvas, w, y, w, h, 0, 0, 1011, 638);
        };
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
