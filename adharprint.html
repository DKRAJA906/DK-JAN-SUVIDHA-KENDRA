<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DK Jan Suvidha Kendra - Instant Aadhaar A4 Print Portal</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <style>
    :root {
      --bg-color: #f3f4f6;
      --panel-bg: #ffffff;
      --primary-blue: #0f529a;
      --card-w: 85.6mm;
      --card-h: 53.98mm;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: Arial, sans-serif;
      background: var(--bg-color);
      padding: 20px;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* कंट्रोल पैनल (वेबसाइट पर दिखने वाला हिस्सा) */
    .control-panel {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 25px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 30px;
    }

    .shop-header {
      background: linear-gradient(135deg, #0f529a 0%, #0a396c 100%);
      color: white;
      padding: 15px;
      text-align: center;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .shop-header h1 { font-size: 24px; letter-spacing: 1px; }
    .shop-header p { font-size: 13px; color: #e0e0e0; margin-top: 5px; }

    .upload-box {
      border: 2px dashed var(--primary-blue);
      background: #f8fafc;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 20px;
    }

    .upload-box label {
      display: block;
      font-weight: bold;
      color: var(--primary-blue);
      margin-bottom: 10px;
      font-size: 16px;
    }

    .input-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="file"], input[type="password"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    input[type="password"] { width: 200px; }

    .btn-print {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-print:hover { background: #1b5e20; }

    /* प्रिंट प्रीव्यू एरिया (स्क्रीन पर कैसा दिखेगा) */
    .preview-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #555;
      width: 100%;
      max-width: 210mm;
      text-align: left;
    }

    /* A4 शीट का लाइव प्रीव्यू स्क्रीन पर */
    #a4-page-sheet {
      background: white;
      width: 210mm;
      height: 297mm;
      box-shadow: 0 4px 25px rgba(0,0,0,0.15);
      padding: 15mm 12mm; /* ए4 मार्जिन सेटिंग्स */
      position: relative;
    }

    /* दोनों कार्ड्स को अगल-बगल रखने के लिए फ्लेक्स ग्रिड */
    .cards-wrapper {
      display: flex;
      flex-direction: row;
      gap: 6mm; /* दोनों कार्ड्स के बीच की दूरी */
      justify-content: flex-start;
    }

    .aadhaar-card-render {
      width: var(--card-w);
      height: var(--card-h);
      border: 0.3mm solid #999;
      border-radius: 3mm;
      overflow: hidden;
      position: relative;
      background: #fff;
    }

    /* पीडीएफ पेज को ऑटो-फिट स्केल करने के लिए */
    .pdf-canvas-render {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status-msg {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
      color: #d32f2f;
    }

    /* --- PRINT STYLES (केवल प्रिंटर के लिए) --- */
    @media print {
      body { background: white; padding: 0; margin: 0; }
      .control-panel, .preview-title { display: none !important; }
      #a4-page-sheet {
        box-shadow: none !important;
        padding: 15mm 12mm !important;
        margin: 0 !important;
        border: none !important;
        width: 210mm !important;
        height: 297mm !important;
        display: block !important;
      }
      .cards-wrapper {
        display: flex !important;
        flex-direction: row !important;
        gap: 6mm !important;
      }
      .aadhaar-card-render {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @page { size: A4 portrait; margin: 0; }
    }
  </style>
</head>
<body>

  <div class="control-panel">
    <div class="shop-header">
      <h1>DK JAN SUVIDHA KENDRA</h1>
      <p>Instant Password-Protected Aadhaar PDF Printing System (A4 Layout)</p>
    </div>

    <div class="upload-box">
      <label>🔒 ई-आधार पीडीएफ अपलोड करें और पासवर्ड डालें:</label>
      <div class="input-group">
        <input type="file" id="pdfFile" accept=".pdf" />
        <input type="password" id="pdfPassword" placeholder="PDF पासवर्ड दर्ज करें" />
        <button class="btn-print" id="printActionBtn">क्विक प्रिंट (Print)</button>
      </div>
      <div id="statusOutput" class="status-msg" style="color: #2e7d32; margin-top: 12px;">कृपया पीडीएफ और पासवर्ड दर्ज करें...</div>
    </div>
    
    <p style="font-size: 12px; color: #666; text-align: center;">
      💡 <b>टिप:</b> आधार पीडीएफ का पासवर्ड आपके नाम के पहले 4 अक्षर (CAPITAL) और आपका जन्म का वर्ष होता है (जैसे: <code>RAMN2002</code>)।
    </p>
  </div>

  <div class="preview-title">A4 पेपर प्रिंट प्रीव्यू (अगल-बगल लेआउट):</div>

  <div id="a4-page-sheet">
    <div class="cards-wrapper">
      
      <div class="aadhaar-card-render" id="frontCardBox">
        <canvas id="frontCanvas" class="pdf-canvas-render"></canvas>
      </div>

      <div class="aadhaar-card-render" id="backCardBox">
        <canvas id="backCanvas" class="pdf-canvas-render"></canvas>
      </div>

    </div>
  </div>

  <script>
    // PDF.js worker फ़ाइल कॉन्फ़िगरेशन
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fileInput = document.getElementById('pdfFile');
    const passwordInput = document.getElementById('pdfPassword');
    const statusOutput = document.getElementById('statusOutput');
    const printActionBtn = document.getElementById('printActionBtn');

    let pdfDataBuffer = null;

    // फाइल सेलेक्ट होने पर बफर में लोड करना
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        pdfDataBuffer = new Uint8Array(evt.target.result);
        statusOutput.style.color = '#333';
        statusOutput.textContent = "पीडीएफ लोड हो गई है। अब पासवर्ड डालकर चेक करें।";
        processAadhaarPdf();
      };
      reader.readAsArrayBuffer(file);
    });

    // पासवर्ड बदलने पर तुरंत रेंडर ट्रिगर करना
    passwordInput.addEventListener('input', function() {
      if (pdfDataBuffer) {
        processAadhaarPdf();
      }
    });

    // आधार पीडीएफ को रेंडर और ऑटो-क्रॉप करने का मेन फंक्शन
    async function processAadhaarPdf() {
      if (!pdfDataBuffer) return;
      
      const password = passwordInput.value.trim();
      statusOutput.style.color = '#0f529a';
      statusOutput.textContent = "पीडीएफ को डिक्रिप्ट और रेंडर किया जा रहा है...";

      try {
        // पासवर्ड के साथ पीडीएफ खोलना
        const loadingTask = pdfjsLib.getDocument({
          data: pdfDataBuffer,
          password: password
        });

        const pdf = await loadingTask.promise;
        // आधार आमतौर पर 1 पेज का ही होता है
        const page = await pdf.getPage(1); 
        
        statusOutput.style.color = '#2e7d32';
        statusOutput.textContent = "🎉 सफलता! पीडीएफ अनलॉक हो गई है और कार्ड्स सेट कर दिए गए हैं।";

        // कार्ड रेंडरिंग की सेटिंग्स (High Quality Resolution)
        const scale = 4.0; 
        const viewport = page.getViewport({ scale: scale });

        // --- फ्रंट कार्ड रेंडरिंग (Front Card) ---
        const frontCanvas = document.getElementById('frontCanvas');
        const frontCtx = frontCanvas.getContext('2d');
        
        // पूरे पेज का साइज
        frontCanvas.width = viewport.width;
        frontCanvas.height = viewport.height;

        // --- बैक कार्ड रेंडरिंग (Back Card) ---
        const backCanvas = document.getElementById('backCanvas');
        const backCtx = backCanvas.getContext('2d');
        
        backCanvas.width = viewport.width;
        backCanvas.height = viewport.height;

        const renderContextFront = { canvasContext: frontCtx, viewport: viewport };
        await page.render(renderContextFront).promise;

        // दोबारा रेंडर करके दूसरे कैनवास पर लाना
        const renderContextBack = { canvasContext: backCtx, viewport: viewport };
        await page.render(renderContextBack).promise;

        // आधुनिक ई-आधार पीडीएफ में नीचे के हिस्से को फ्रंट और बैक में काटने का एकदम सटीक CSS क्रॉपिंग पोजीशन
        adjustCardViewports();

      } catch (error) {
        statusOutput.style.color = '#d32f2f';
        if (error.name === 'PasswordException') {
          statusOutput.textContent = "❌ गलत पासवर्ड! कृपया सही CAPITAL अक्षरों और जन्म वर्ष का इस्तेमाल करें।";
        } else {
          statusOutput.textContent = "❌ एरर: पीडीएफ रीड करने में दिक्कत आई है। कृपया ओरिजिनल फाइल चुनें।";
          console.error(error);
        }
      }
    }

    // दोनों कैनवास को आधार कार्ड के नीचे के दोनों हिस्सों पर फोकस करने के लिए स्मार्ट क्लिपिंग/पोजीशनिंग
    function adjustCardViewports() {
      const frontCanvas = document.getElementById('frontCanvas');
      const backCanvas = document.getElementById('backCanvas');

      // CSS का उपयोग करके कैनवास के केवल निचले हिस्से (आधार कार्ड विंग्स) को व्यू-बॉक्स में फिट करना
      // डिफ़ॉल्ट सरकारी आधार लेआउट के अनुसार:
      frontCanvas.style.width = '203%'; 
      frontCanvas.style.height = '335%';
      frontCanvas.style.position = 'absolute';
      frontCanvas.style.bottom = '0';
      frontCanvas.style.left = '0';

      backCanvas.style.width = '203%';
      backCanvas.style.height = '335%';
      backCanvas.style.position = 'absolute';
      backCanvas.style.bottom = '0';
      backCanvas.style.right = '0'; // बैक साइड हमेशा दाईं तरफ होती है नीचे पट्टी में
    }

    // प्रिंट बटन एक्शन
    printActionBtn.addEventListener('click', function() {
      if (!pdfDataBuffer) {
        alert("कृपया पहले आधार पीडीएफ फाइल सेलेक्ट करें!");
        return;
      }
      window.print();
    });
  </script>
</body>
</html>
