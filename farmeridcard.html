<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DK Jan Suvidha Kendra - AgriStack Farmer ID Card Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    /* ... (आपका CSS यहाँ पहले जैसा ही रहेगा) ... */
    :root{--green:#0b4622; --gold:#e2a114; --card-w:85.6mm; --card-h:53.98mm;}
    body{font-family:Arial,sans-serif; background:#eef2f3; padding:20px; display:flex; flex-direction:column; align-items:center;}
    .id-card{width:var(--card-w); height:var(--card-h); border:.8px solid var(--green); border-radius:3mm; background:#fff; overflow:hidden; display:flex; flex-direction:column; position:relative;}
    .card-header{background:var(--green); color:#fff; padding:2mm; display:flex; justify-content:space-between; align-items:center; border-bottom:.45mm solid var(--gold);}
    .card-body-front{padding:2mm; display:flex; gap:2mm; align-items:center; flex:1;}
    .info-table{width:100%; border-collapse:collapse; font-size:2.1mm;}
    .info-table td{padding:.4mm 0;}
    .info-label{width:16mm; font-weight:700; color:#555;}
    /* ... बाकी CSS जैसा था वैसा ही रखें ... */
  </style>
</head>
<body>
  <div class="container">
    <h2>AgriStack फार्मर आईडी कार्ड पोर्टल</h2>
    <div class="form-grid">
      <div class="form-group">
        <label for="nameEn">Farmer Name (English):</label>
        <input type="text" id="nameEn" value="Farmer Name">
      </div>
      <div class="form-group">
        <label for="nameHi">किसान का नाम (Hindi):</label>
        <input type="text" id="nameHi" value="किसान का नाम">
      </div>
      <div class="form-group">
        <label for="fatherName">Father's Name:</label>
        <input type="text" id="fatherName" value="">
      </div>
      <div class="form-group">
        <label for="dob">Date of Birth (DOB):</label>
        <input type="text" id="dob" value="01/01/2000">
      </div>
      </div>
  </div>

  <div id="id-card-print-area">
    <div class="id-card">
      <div class="card-header"><h3>AgriStack फार्मर आईडी कार्ड</h3></div>
      <div class="card-body-front">
        <div class="info-box">
          <p class="farmer-name-en" id="lblNameEn">Farmer Name</p>
          <table class="info-table">
            <tr><td class="info-label">Father:</td><td id="lblFatherName">-</td></tr>
            <tr><td class="info-label">DOB:</td><td id="lblDob">01/01/2000</td></tr>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);
    const fields = {
      nameEn: el('nameEn'), nameHi: el('nameHi'), fatherName: el('fatherName'),
      dob: el('dob'), // अन्य फील्ड्स भी यहाँ जोड़ें
    };

    function updateCard() {
      el('lblNameEn').textContent = fields.nameEn.value || '-';
      el('lblFatherName').textContent = fields.fatherName.value || '-';
      el('lblDob').textContent = fields.dob.value || '-';
    }

    // PDF Parsing में अपडेट
    // PDF लूप के अंदर जहाँ पिता का नाम ढूंढना है:
    const fatherNameMatch = cleanText.match(/(?:Father's\sName|Father\sName|पिता\sका\sनाम)[\s:-]+(.+)/i);
    if (fatherNameMatch) {
        fields.fatherName.value = fatherNameMatch[1].trim();
    }

    document.querySelectorAll('input').forEach(i => i.addEventListener('input', updateCard));
    updateCard();
  </script>
</body>
</html>
