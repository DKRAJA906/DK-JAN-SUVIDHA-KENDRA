<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer ID Card Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            margin-bottom: 30px;
        }
        h2 {
            text-align: center;
            color: #2e7d32;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1b5e20;
        }

        /* ID Card Design */
        #id-card-print-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .id-card {
            width: 325px;
            height: 204px; /* Standard CR80 Size ratio */
            border: 2px solid #2e7d32;
            border-radius: 10px;
            background: #fff;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
            box-sizing: border-box;
        }
        .card-header {
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            color: white;
            padding: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .card-body {
            padding: 10px;
            display: flex;
        }
        .photo-area {
            width: 75px;
            height: 95px;
            border: 1px dashed #777;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #777;
            background: #fafafa;
            margin-right: 12px;
        }
        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .details-area {
            flex: 1;
            font-size: 11px;
            color: #333;
            line-height: 1.5;
        }
        .details-area table {
            width: 100%;
            border-collapse: collapse;
        }
        .details-area td {
            padding: 2px 0;
            vertical-align: top;
        }
        .label-cell {
            font-weight: bold;
            width: 75px;
            color: #1b5e20;
        }
        .card-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #2e7d32;
            color: white;
            text-align: center;
            font-size: 9px;
            padding: 4px 0;
        }

        /* Print Optimization */
        @media print {
            body * {
                visibility: hidden;
            }
            #id-card-print-area, #id-card-print-area * {
                visibility: visible;
            }
            #id-card-print-area {
                position: absolute;
                left: 0;
                top: 0;
                display: flex;
                gap: 20px;
            }
            .id-card {
                box-shadow: none;
                border: 1px solid #2e7d32;
                page-break-inside: avoid;
            }
            button, .container {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>किसान पहचान पत्र जनरेटर</h2>
    
    <div class="form-group">
        <label>किसान का नाम (Farmer Name):</label>
        <input type="text" id="farmerName" placeholder="नाम दर्ज करें" oninput="updateCard()">
    </div>
    <div class="form-group">
        <label>पिता/पति का नाम (Father/Husband Name):</label>
        <input type="text" id="fatherName" placeholder="पिता/पति का नाम दर्ज करें" oninput="updateCard()">
    </div>
    <div class="form-group">
        <label>किसान आईडी / रजिस्ट्रेशन नंबर:</label>
        <input type="text" id="farmerId" placeholder="ID Number दर्ज करें" oninput="updateCard()">
    </div>
    <div class="form-group">
        <label>मोबाइल नंबर:</label>
        <input type="text" id="mobileNo" placeholder="9876XXXXXX" maxlength="10" oninput="updateCard()">
    </div>
    <div class="form-group">
        <label>ग्राम / पता (Address):</label>
        <input type="text" id="address" placeholder="पता दर्ज करें" oninput="updateCard()">
    </div>
    <div class="form-group">
        <label>फोटो अपलोड करें:</label>
        <input type="file" id="photoInput" accept="image/*" onchange="loadPhoto(event)">
    </div>

    <div class="btn-container">
        <button onclick="window.print()">आईडी कार्ड प्रिंट करें</button>
    </div>
</div>

<div id="id-card-print-area">
    <div class="id-card">
        <div class="card-header">
            किसान पहचान पत्र (FARMER ID CARD)
        </div>
        <div class="card-body">
            <div class="photo-area" id="photoPreview">फोटो</div>
            <div class="details-area">
                <table>
                    <tr>
                        <td class="label-cell">किसान आईडी:</td>
                        <td id="lblId">-</td>
                    </tr>
                    <tr>
                        <td class="label-cell">नाम:</td>
                        <td id="lblName" style="font-weight: bold;">-</td>
                    </tr>
                    <tr>
                        <td class="label-cell">पिता/पति:</td>
                        <td id="lblFather">-</td>
                    </tr>
                    <tr>
                        <td class="label-cell">मोबाइल:</td>
                        <td id="lblMobile">-</td>
                    </tr>
                    <tr>
                        <td class="label-cell">पता:</td>
                        <td id="lblAddress">-</td>
                    </tr>
                </table>
            </div>
        </div>
        <div class="card-footer">
            कृषि विभाग एवं डिजिटल सेवा केंद्र द्वारा प्रमाणित
        </div>
    </div>
</div>

<script>
    // Live update text fields
    function updateCard() {
        document.getElementById('lblId').innerText = document.getElementById('farmerId').value || '-';
        document.getElementById('lblName').innerText = document.getElementById('farmerName').value || '-';
        document.getElementById('lblFather').innerText = document.getElementById('fatherName').value || '-';
        document.getElementById('lblMobile').innerText = document.getElementById('mobileNo').value || '-';
        document.getElementById('lblAddress').innerText = document.getElementById('address').value || '-';
    }

    // Live update photo
    function loadPhoto(event) {
        var reader = new FileReader();
        reader.onload = function(){
            var output = document.getElementById('photoPreview');
            output.innerHTML = '<img src="' + reader.result + '" />';
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

</body>
</html>
